name: cvcheck
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: curriculum-vitae

      - uses: actions/checkout@v4
        with:
          repository: ceduardorodrig/SUMAENIMA-HUB
          path: sumaenima-hub
          ssh-key: ${{ secrets.STENIOCHECK_SSH_KEY }}

      - name: Rodar steniocheck (perfil resume)
        working-directory: curriculum-vitae
        run: |
          PYTHONPATH=${{ github.workspace }}/sumaenima-hub/scripts \
            python3 -m steniocheck --tag resume --scope static --format github
